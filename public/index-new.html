<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FinA – Personal Finance Management</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js" defer></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js" defer></script>
    <link rel="stylesheet" href="/css/style-new.css">
</head>

<body>
    <div id="app">
        <!-- Auth View -->
        <div id="auth-view" class="auth-container hidden"></div>

        <!-- Main App -->
        <div id="main-app" class="app-shell hidden">
            <!-- Sidebar -->
            <aside id="sidebar" class="sidebar">
                <div class="sidebar-header">
                    <div class="logo">
                        <div class="logo-icon">
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                stroke-width="2.5">
                                <line x1="12" y1="1" x2="12" y2="23"></line>
                                <path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"></path>
                            </svg>
                        </div>
                        <div class="logo-text">
                            <div class="logo-title">FinA</div>
                            <div class="logo-subtitle">Personal Finance</div>
                        </div>
                    </div>
                    <button id="sidebar-close" class="sidebar-close">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2">
                            <line x1="18" y1="6" x2="6" y2="18"></line>
                            <line x1="6" y1="6" x2="18" y2="18"></line>
                        </svg>
                    </button>
                </div>

                <nav id="nav-menu" class="sidebar-nav"></nav>

                <div class="sidebar-footer">
                    <div class="user-profile">
                        <div id="user-avatar" class="user-avatar">U</div>
                        <div class="user-info">
                            <div id="user-name" class="user-name">User</div>
                            <div id="user-email" class="user-email">user@example.com</div>
                        </div>
                    </div>
                    <button id="btn-logout" class="btn-logout">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2">
                            <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path>
                            <polyline points="16 17 21 12 16 7"></polyline>
                            <line x1="21" y1="12" x2="9" y2="12"></line>
                        </svg>
                        Sign Out
                    </button>
                </div>
            </aside>

            <!-- Main Content -->
            <div class="main-content">
                <!-- Header -->
                <header class="header">
                    <button id="sidebar-toggle" class="sidebar-toggle">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2">
                            <line x1="3" y1="12" x2="21" y2="12"></line>
                            <line x1="3" y1="6" x2="21" y2="6"></line>
                            <line x1="3" y1="18" x2="21" y2="18"></line>
                        </svg>
                    </button>

                    <div class="search-bar">
                        <svg class="search-icon" width="16" height="16" viewBox="0 0 24 24" fill="none"
                            stroke="currentColor" stroke-width="2">
                            <circle cx="11" cy="11" r="8"></circle>
                            <path d="m21 21-4.35-4.35"></path>
                        </svg>
                        <input type="text" placeholder="Search transactions, budgets..." class="search-input">
                    </div>

                    <div class="header-actions">
                        <button class="icon-btn">
                            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                stroke-width="2">
                                <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"></path>
                                <path d="M13.73 21a2 2 0 0 1-3.46 0"></path>
                            </svg>
                        </button>
                    </div>
                </header>

                <!-- Page Content -->
                <main id="router-view" class="page-content"></main>
            </div>
        </div>

        <!-- Mobile Bottom Nav -->
        <nav id="bottom-nav" class="bottom-nav hidden">
            <a href="#dashboard" class="bottom-nav-item active">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <rect x="3" y="3" width="7" height="7"></rect>
                    <rect x="14" y="3" width="7" height="7"></rect>
                    <rect x="14" y="14" width="7" height="7"></rect>
                    <rect x="3" y="14" width="7" height="7"></rect>
                </svg>
                <span>Dashboard</span>
            </a>
            <a href="#transactions" class="bottom-nav-item">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <polyline points="23 6 13.5 15.5 8.5 10.5 1 18"></polyline>
                    <polyline points="17 6 23 6 23 12"></polyline>
                </svg>
                <span>Transactions</span>
            </a>
            <a href="#fraud" class="bottom-nav-item">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"></path>
                </svg>
                <span>Security</span>
            </a>
            <a href="#profile" class="bottom-nav-item">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
                    <circle cx="12" cy="7" r="4"></circle>
                </svg>
                <span>Profile</span>
            </a>
        </nav>
    </div>

    <script type="module" src="/js/app-new.js?v=13"></script>
    <script>
        // Register Service Worker to prevent unnecessary reloads
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', function() {
                navigator.serviceWorker.register('/sw.js')
                    .then(function(registration) {
                        console.log('ServiceWorker registration successful');
                    })
                    .catch(function(err) {
                        console.log('ServiceWorker registration failed: ', err);
                    });
            });
        }

        // Error handler
        window.addEventListener('error', function (e) {
            console.error('Global error:', e.error);
        });

        // Check if scripts loaded
        window.addEventListener('load', function () {
            console.log('Page loaded');
            console.log('Supabase:', typeof window.supabase);
            console.log('Chart:', typeof window.Chart);
        });

        // Prevent page reload on tab switch
        let isTabActive = true;
        
        document.addEventListener('visibilitychange', function() {
            isTabActive = !document.hidden;
            if (isTabActive) {
                console.log('Tab became active - maintaining state');
            } else {
                console.log('Tab became inactive - preserving state');
            }
        });

        // Prevent accidental navigation
        window.addEventListener('beforeunload', function(e) {
            // Only prevent if user is actually trying to leave
            if (isTabActive && !e.target.activeElement?.href) {
                // Don't show warning for normal tab switches
                return;
            }
        });
    </script>
</body>

</html>
