version: '3.8'

services:
  # Backend API
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: fina-backend
    ports:
      - "8000:8000"
    environment:
      # Database
      - SUPABASE_URL=${SUPABASE_URL}
      - SUPABASE_KEY=${SUPABASE_KEY}
      
      # LLM Providers
      - GROQ_API_KEY=${GROQ_API_KEY}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      
      # Application
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - ENVIRONMENT=${ENVIRONMENT:-production}
      - PORT=8000
      - PYTHONUNBUFFERED=1
      
      # Vector Store
      - FAISS_INDEX_PATH=/app/data/vector_index
      
      # Guardrails
      - MAX_TRANSACTION_AMOUNT=10000000
      - MAX_BUDGET_LIMIT=5000000
      - MAX_INSURANCE_COVERAGE=100000000
      
      # Observability
      - METRICS_ENABLED=true
      - TRACING_ENABLED=true
    volumes:
      - ./backend/data:/app/data
      - ./backend/logs:/app/logs
      - ./backend/ml/models:/app/ml/models
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - fina-network

  # Frontend (optional - if serving static files)
  frontend:
    image: nginx:alpine
    container_name: fina-frontend
    ports:
      - "80:80"
    volumes:
      - ./public:/usr/share/nginx/html:ro
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - fina-network

  # Redis (for caching and rate limiting)
  redis:
    image: redis:7-alpine
    container_name: fina-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    restart: unless-stopped
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - fina-network

  # Prometheus (for metrics)
  prometheus:
    image: prom/prometheus:latest
    container_name: fina-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
    restart: unless-stopped
    networks:
      - fina-network

  # Grafana (for visualization)
  grafana:
    image: grafana/grafana:latest
    container_name: fina-grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD:-admin}
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - grafana-data:/var/lib/grafana
    depends_on:
      - prometheus
    restart: unless-stopped
    networks:
      - fina-network

networks:
  fina-network:
    driver: bridge

volumes:
  redis-data:
  prometheus-data:
  grafana-data:
