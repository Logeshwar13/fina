# Prometheus Configuration for FinA

global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    cluster: 'fina-production'
    environment: 'production'

# Alerting configuration
alerting:
  alertmanagers:
    - static_configs:
        - targets: []

# Rule files
rule_files:
  # - "alerts.yml"

# Scrape configurations
scrape_configs:
  # FinA Backend API
  - job_name: 'fina-backend'
    static_configs:
      - targets: ['backend:8000']
    metrics_path: '/observability/metrics'
    scrape_interval: 10s
    scrape_timeout: 5s

  # Prometheus itself
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  # Redis
  - job_name: 'redis'
    static_configs:
      - targets: ['redis:6379']
